services:
  # ─── Databases ──────────────────────────────────────────────────────────────
  mongo-auth:
    image: mongo:7-jammy
    container_name: mongo-auth
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: auth-db
    volumes:
      - mongo_auth_data:/data/db
    ports:
      - "27017:27017"   # exposed so seed script can run from host
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-user:
    image: mongo:7-jammy
    container_name: mongo-user
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: user-db
    volumes:
      - mongo_user_data:/data/db
    ports:
      - "27018:27017"   # exposed on different host port to avoid conflicts
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-task:
    image: mongo:7-jammy
    container_name: mongo-task
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: task-db
    volumes:
      - mongo_task_data:/data/db
    ports:
      - "27019:27017"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-notification:
    image: mongo:7-jammy
    container_name: mongo-notification
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: notification-db
    volumes:
      - mongo_notification_data:/data/db
    ports:
      - "27020:27017"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Seeder (runs once, exits) ───────────────────────────────────────────────
  seeder:
    image: node:20-alpine
    container_name: seeder
    working_dir: /scripts
    volumes:
      - ./scripts:/scripts
    environment:
      AUTH_MONGODB_URI: mongodb://mongo-auth:27017/auth-db
      USER_MONGODB_URI: mongodb://mongo-user:27017/user-db
      TASK_MONGODB_URI: mongodb://mongo-task:27017/task-db
      NOTIFICATION_MONGODB_URI: mongodb://mongo-notification:27017/notification-db
    command: sh -c "npm install --silent && node seed.js"
    depends_on:
      mongo-auth:
        condition: service_healthy
      mongo-user:
        condition: service_healthy
      mongo-task:
        condition: service_healthy
      mongo-notification:
        condition: service_healthy
    networks:
      - internal
    restart: "no"   # runs once and exits — does not restart

  # ─── Microservices ───────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./src/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    env_file: ./src/services/auth-service/.env
    environment:
      MONGODB_URI: mongodb://mongo-auth:27017/auth-db
    depends_on:
      mongo-auth:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    build:
      context: ./src/services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    env_file: ./src/services/user-service/.env
    environment:
      MONGODB_URI: mongodb://mongo-user:27017/user-db
    depends_on:
      mongo-user:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  task-service:
    build:
      context: ./src/services/task-service
      dockerfile: Dockerfile
    container_name: task-service
    restart: unless-stopped
    env_file: ./src/services/task-service/.env
    environment:
      MONGODB_URI: mongodb://mongo-task:27017/task-db
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
    depends_on:
      mongo-task:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    build:
      context: ./src/services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    environment:
      PORT: 3004
      MONGODB_URI: mongodb://mongo-notification:27017/notification-db
    depends_on:
      mongo-notification:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  analytics-service:
    build:
      context: ./src/services/analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    restart: unless-stopped
    environment:
      PORT: 3005
      MONGODB_URI: mongodb://mongo-task:27017/task-db   # read-only access to task-db
    depends_on:
      mongo-task:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    build:
      context: ./src/services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    env_file: ./src/services/api-gateway/.env
    environment:
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      TASK_SERVICE_URL: http://task-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      ANALYTICS_SERVICE_URL: http://analytics-service:3005
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    networks:
      - internal
      - public

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      - api-gateway
    networks:
      - public

volumes:
  mongo_auth_data:
  mongo_user_data:
  mongo_task_data:
  mongo_notification_data:

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge
