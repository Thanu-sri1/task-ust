# Production PersistentVolume — use cloud StorageClass in managed clusters.
# For on-prem/bare-metal replace storageClassName: manual with your provisioner.
# In cloud environments (EKS, GKE, AKS) prefer managed MongoDB (Atlas, DocumentDB)
# and skip this file entirely — set MONGODB_URI secret to the Atlas connection string.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-pv-prod
  labels:
    app: mongo
    env: prod
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /data/prod/mongo

---
# PersistentVolumeClaim — prod namespace
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: prod
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 50Gi
  selector:
    matchLabels:
      app: mongo
      env: prod
