# Production PersistentVolumes — use cloud StorageClass in managed clusters.
# For on-prem/bare-metal replace storageClassName: manual with your provisioner.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-auth-pv-prod
  labels:
    app: mongo-auth
    env: prod
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /data/prod/mongo-auth

---
apiVersion: v1
kind: PersistentVolume
