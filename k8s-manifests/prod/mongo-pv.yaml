---
# PersistentVolumeClaims — prod namespace
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-auth-pvc
  namespace: prod
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 10Gi
  selector:
    matchLabels:
      app: mongo-auth
      env: prod

