---
# PersistentVolumeClaims — namespace-scoped (dev)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-auth-pvc
  namespace: dev
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi
  selector:
    matchLabels:
      app: mongo-auth
      env: dev

