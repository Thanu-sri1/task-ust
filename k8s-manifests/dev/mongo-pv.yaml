# PersistentVolumes — cluster-scoped (no namespace)
# Uses hostPath for local/dev clusters (minikube, kind, k3s).
# Replace with cloud provisioner StorageClass in managed clusters.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-auth-pv-dev
  labels:
    app: mongo-auth
    env: dev
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /data/dev/mongo-auth

---
apiVersion: v1
kind: PersistentVolume
