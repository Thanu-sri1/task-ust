# PersistentVolume — cluster-scoped (no namespace)
# Uses hostPath for local/dev clusters (minikube, kind, k3s).
# Replace with cloud provisioner StorageClass in managed clusters.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-pv-dev
  labels:
    app: mongo
    env: dev
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /data/dev/mongo

---
# PersistentVolumeClaim — namespace-scoped (dev)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: dev
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: mongo
      env: dev
