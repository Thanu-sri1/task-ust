# Single shared MongoDB deployment for dev namespace
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: dev
  # labels:
  #   app: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7-jammy
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: taskflow
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: mongo-vct
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-vct
      spec:
        accessModes: ["ReadWriteMany"]
        storageClassName: "storage"
        resources:
          requests:
            storage: 2Gi
      # volumes:
      #   - name: mongo-storage
      #     persistentVolumeClaim:
      #       claimName: mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: dev
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
