# MongoDB deployments with PVC-backed storage for dev namespace
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-auth
  namespace: dev
  labels:
    app: mongo-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-auth
  template:
    metadata:
      labels:
        app: mongo-auth
    spec:
      containers:
        - name: mongo-auth
          image: mongo:7-jammy
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: auth-db
          volumeMounts:
            - name: mongo-auth-storage
              mountPath: /data/db
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: mongo-auth-storage
          persistentVolumeClaim:
            claimName: mongo-auth-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-auth
  namespace: dev
spec:
  selector:
    app: mongo-auth
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
---
