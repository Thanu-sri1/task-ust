enabled: true
namespace: dev
name: api-gateway
replicas: 1
image: thanusri22/api-gateway:v1.1.1
imagePullPolicy: Always
containerPort: 3000
servicePort: 3000
serviceTargetPort: 3000
serviceType: ClusterIP
env:
  - name: PORT
    value: "3000"
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: JWT_SECRET
  - name: AUTH_SERVICE_URL
    valueFrom:
      configMapKeyRef:
        name: app-config
        key: AUTH_SERVICE_URL
  - name: USER_SERVICE_URL
    valueFrom:
      configMapKeyRef:
        name: app-config
        key: USER_SERVICE_URL
  - name: TASK_SERVICE_URL
    valueFrom:
      configMapKeyRef:
        name: app-config
        key: TASK_SERVICE_URL
  - name: NOTIFICATION_SERVICE_URL
    valueFrom:
      configMapKeyRef:
        name: app-config
        key: NOTIFICATION_SERVICE_URL
  - name: ANALYTICS_SERVICE_URL
    valueFrom:
      configMapKeyRef:
        name: app-config
        key: ANALYTICS_SERVICE_URL
  - name: ALLOWED_ORIGINS
    valueFrom:
      configMapKeyRef:
        name: app-config
        key: ALLOWED_ORIGINS
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"
