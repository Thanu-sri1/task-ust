namespace: prod
replicas: 2
image: YOUR_REGISTRY/frontend:latest
imagePullPolicy: IfNotPresent
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 20
readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
