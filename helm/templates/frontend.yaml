{{- if .Values.frontend.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.frontend.name }}
  strategy:
    blueGreen:
      activeService: {{ .Values.frontend.name }}
      previewService: {{ printf "%s-preview" .Values.frontend.name }}
      autoPromotionEnabled: true
  template:
    metadata:
      labels:
        app: {{ .Values.frontend.name }}
    spec:
{{- with .Values.frontend.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: {{ .Values.frontend.name }}
          image: {{ .Values.frontend.image }}
          imagePullPolicy: {{ .Values.frontend.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.containerPort }}
{{- with .Values.frontend.env }}
          env:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.frontend.resources }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.frontend.livenessProbe }}
          livenessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.frontend.readinessProbe }}
          readinessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.frontend.name }}
  ports:
    - port: {{ .Values.frontend.servicePort }}
      targetPort: {{ .Values.frontend.serviceTargetPort }}
  type: {{ .Values.frontend.serviceType }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-preview" .Values.frontend.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.frontend.name }}
  ports:
    - port: {{ .Values.frontend.servicePort }}
      targetPort: {{ .Values.frontend.serviceTargetPort }}
  type: {{ .Values.frontend.serviceType }}
{{- end }}
