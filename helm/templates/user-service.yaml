{{- if .Values.userService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.userService.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.userService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.userService.name }}
{{- with .Values.userService.strategy }}
  strategy:
{{ toYaml . | nindent 4 }}
{{- end }}
  template:
    metadata:
      labels:
        app: {{ .Values.userService.name }}
    spec:
{{- with .Values.userService.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: {{ .Values.userService.name }}
          image: {{ .Values.userService.image }}
          imagePullPolicy: {{ .Values.userService.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.userService.containerPort }}
{{- with .Values.userService.env }}
          env:
{{ toYaml . | nindent 12 }}
{{- end }}
          resources:
{{ toYaml .Values.userService.resources | nindent 12 }}
{{- with .Values.userService.livenessProbe }}
          livenessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.userService.readinessProbe }}
          readinessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.userService.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.userService.name }}
  ports:
    - port: {{ .Values.userService.servicePort }}
      targetPort: {{ .Values.userService.serviceTargetPort }}
  type: {{ .Values.userService.serviceType }}
{{- end }}
