apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskflow-frontend-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: taskflow
  source:
    repoURL: https://github.com/Thanu-sri1/task-ust.git
    targetRevision: main
    path: helm
    helm:
      releaseName: taskflow-frontend-dev
      valueFiles:
        - values.yaml
      values: |
        configMap:
          enabled: false
        secret:
          enabled: false
        storageClass:
          enabled: false
        gateway:
          enabled: false
        httpRoute:
          enabled: false
        mongo:
          statefulSet:
            enabled: false
          service:
            enabled: false
        authService:
          enabled: false
        userService:
          enabled: false
        taskService:
          enabled: false
        notificationService:
          enabled: false
        analyticsService:
          enabled: false
        apiGateway:
          enabled: false
        frontend:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
