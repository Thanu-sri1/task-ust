apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskflow-app-of-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: taskflow
  source:
    repoURL: https://github.com/Thanu-sri1/task-ust.git
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
